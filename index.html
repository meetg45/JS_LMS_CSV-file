<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV Data Explorer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main">
      <h1>CSV Data Explorer</h1>

      <input type="file" id="csvFile" accept=".csv" />
      <div id="loader" style="display: none">Loading Data...</div>
      <br /><br />
      <div id="pagination">
        <button id="colSelection">Columns</button>

        <select name="rows" id="rows">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <button id="prev">Prev</button>
        <input type="number" id="page-num" value="1" min="1" />
        <span id="total-pages">/ 0</span>
        <button id="next">Next</button>
        <input type="text" id="search" placeholder="search" />
        <button id="reset">Reset</button>
      </div>
      <div id="showHeaderPanel"></div>
      <br /><br />
      <div class="output">
        <table border="1">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <br /><br />
    </div>
    <div id="popUpForm">
      <div id="popupContent">
        <button id="closeBtn">X</button>
        <div id="formData"></div>
      </div>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
